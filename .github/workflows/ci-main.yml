name: CI — main

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest -m unit -v --tb=short

  build:
    name: Build checks
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check backend/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check backend/ tests/

      - name: Syntax check
        run: uv run python -m py_compile backend/main.py backend/processing.py backend/kalman.py backend/propagator.py backend/anomaly.py backend/ingest.py backend/conjunction.py

      - name: Type check
        run: uv run mypy backend/ --ignore-missing-imports

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build

    env:
      SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
      SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
      CESIUM_ION_TOKEN: ${{ secrets.CESIUM_ION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run integration tests
        run: uv run pytest -m integration -v --tb=short
