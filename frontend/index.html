<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ne-body (Near Earth body) SSA Platform</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- CesiumJS 1.114 from CDN -->
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>

    <!-- D3.js v7 from CDN -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Cesium Ion token is injected at runtime via GET /config in main.js. -->

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow: hidden; height: 100%; }
        body { background: #0a0a0f; color: #e0e0e0; font-family: monospace; }
        /* NF-022: 18px header for legibility on 1920x1080 projected display at 3m */
        #header { position: fixed; top: 0; left: 0; right: 0; z-index: 300; padding: 6px 16px; background: #0d0d14; border-bottom: 1px solid #222; font-size: 18px; box-shadow: 0 1px 4px rgba(0, 150, 255, 0.15); }
        #main-layout { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        #cesium-container { position: absolute; inset: 0; }
        /* NF-022: minimum 14px for side panel text */
        #side-panel { position: fixed; top: 38px; right: 0; bottom: 0; width: 380px; display: flex; flex-direction: column; border-left: 1px solid #222; font-size: 14px; background: #0a0a0fcc; backdrop-filter: blur(4px); transition: width 0.2s ease; overflow: hidden; z-index: 200; }
        #side-panel.panel-collapsed { width: 0; border-left: none; }
        /* Reopen tab — fixed to right edge, visible only when panel is collapsed */
        #alerts-reopen-tab { display: none; position: fixed; right: 0; top: 50%; transform: translateY(-50%); writing-mode: vertical-rl; background: #0d0d14; border: 1px solid #333; border-right: none; color: #aaa; font-family: monospace; font-size: 12px; padding: 12px 6px; cursor: pointer; z-index: 200; letter-spacing: 0.05em; }
        #alerts-reopen-tab:hover { color: #fff; border-color: #555; }
        #side-panel.panel-collapsed ~ #alerts-reopen-tab { display: block; }
        #residual-chart {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            padding: 0 8px;
            font-size: 14px;
        }
        #residual-chart.chart-expanded {
            max-height: 400px;
            opacity: 1;
            padding: 8px;
        }
        #alert-panel-header { flex-shrink: 0; cursor: pointer; user-select: none; padding: 6px 8px; border-bottom: 1px solid #222; }
        #alert-panel-header:hover { color: #ddd; }
        #alert-panel { flex: 1; min-height: 0; padding: 8px; overflow-y: auto; font-size: 14px; }
        .alert-panel-toggle { float: right; font-size: 11px; color: #666; }

        /* Alert panel styles (F-055) */
        .alert-header {
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
            margin-bottom: 6px;
            color: #aaa;
            letter-spacing: 0.05em;
        }
        .alert-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .alert-item {
            padding: 6px 8px;
            border: 1px solid #333;
            border-radius: 3px;
            background: #12121a;
            font-size: 13px;
            line-height: 1.5;
            transition: opacity 0.3s;
        }
        .alert-item.active {
            border-color: #ff4444;
            animation: alert-pulse 1.2s ease-in-out infinite alternate;
        }
        .alert-item.recalibrating {
            border-color: #ffaa00;
        }
        .alert-item.resolved {
            opacity: 0.6;
            border-color: #333;
        }
        @keyframes alert-pulse {
            from { border-color: #ff4444; }
            to   { border-color: #ff000080; }
        }
        .alert-type-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .alert-type-badge.maneuver        { background: #c0000099; color: #ffcccc; }
        .alert-type-badge.drag_anomaly    { background: #cc660099; color: #ffe0cc; }
        .alert-type-badge.filter_divergence { background: #550077aa; color: #ddaaff; }
        .alert-status {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 1px 5px;
            border-radius: 3px;
        }
        .alert-status.active        { color: #ff6666; }
        .alert-status.recalibrating { color: #ffaa44; }
        .alert-status.resolved      { color: #66cc66; }

        /* Confidence color utility classes */
        .conf-green  { color: #66ff66; }
        .conf-amber  { color: #ffaa00; }
        .conf-red    { color: #ff4444; }

        /* Step 4: Chart hover tooltip */
        .chart-tooltip {
            position: absolute;
            background: #1a1a2e;
            border: 1px solid #444;
            padding: 6px 10px;
            font-size: 12px;
            font-family: monospace;
            color: #e0e0e0;
            pointer-events: none;
            z-index: 10;
            border-radius: 3px;
            white-space: nowrap;
        }

        /* Step 11: Enriched alert card metrics row */
        .alert-metrics {
            color: #888;
            font-size: 11px;
            margin-top: 2px;
        }

        /* Step 13: Object info panel — fixed to viewport upper-left so Cesium's
           stacking context does not clip it. */
        #object-info-panel {
            display: none;
            position: fixed;
            top: 48px; /* below the header */
            left: 12px;
            width: 280px;
            background: #12121aee;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 13px;
            font-family: monospace;
            overflow: hidden;
            z-index: 100;
        }
        #object-info-panel .info-title {
            font-size: 13px;
            font-weight: bold;
            color: #aaa;
            border-bottom: 1px solid #333;
            padding-bottom: 3px;
            margin-bottom: 4px;
        }
        #object-info-panel .info-row {
            color: #ccc;
            font-size: 12px;
            line-height: 1.6;
        }
        #object-info-panel .info-label {
            color: #666;
        }
        #object-info-panel a.norad-link:link    { color: #888; text-decoration: none; }
        #object-info-panel a.norad-link:visited { color: #666; text-decoration: none; }
        #object-info-panel a.norad-link:hover   { color: #bbb; text-decoration: underline; }

        /* SGP4 delta callout — prominent when filter diverges */
        .info-delta {
            margin-top: 6px;
            padding: 5px 8px;
            border-radius: 3px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.04em;
            text-align: center;
        }
        .info-delta.delta-ok     { background: #0d1f0d; color: #66ff66; border: 1px solid #1a4a1a; }
        .info-delta.delta-warn   { background: #1f1500; color: #ffaa00; border: 1px solid #4a3500; }
        .info-delta.delta-alert  { background: #1f0000; color: #ff4444; border: 1px solid #4a0000; }
        .info-delta-label {
            font-size: 10px;
            font-weight: normal;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.7;
            display: block;
            margin-bottom: 1px;
        }
        .info-tle-age { font-size: 11px; }
        .info-tle-age.age-ok   { color: #66ff66; }
        .info-tle-age.age-warn { color: #ffaa00; }
        .info-tle-age.age-old  { color: #ff4444; }

        /* Anomaly history section within #object-info-panel (plan step 1.2) */
        .anomaly-history-section {
            max-height: 180px;
            overflow-y: auto;
            border-top: 1px solid #333;
            margin-top: 6px;
            padding-top: 6px;
        }
        .anomaly-history-title {
            font-size: 11px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }
        .anomaly-history-entry {
            font-size: 11px;
            line-height: 1.5;
            padding: 3px 0;
            border-bottom: 1px solid #222;
        }
        .anomaly-history-entry:last-child {
            border-bottom: none;
        }
        .anomaly-resolved {
            color: #66cc66;
        }
        .anomaly-unresolved {
            color: #ff6666;
        }
        .anomaly-history-empty {
            font-size: 11px;
            color: #555;
            padding: 4px 0;
        }

        /* Conjunction risk styles (plan 2026-03-29-conjunction-risk.md step 11) */
        .conjunction-section {
            border-top: 1px solid #3a1a00;
            margin-top: 5px;
            padding-top: 4px;
        }
        .conjunction-section.conjunction-safe {
            border-top-color: #1a3a1a;
        }
        .conjunction-header {
            font-size: 11px;
            font-weight: bold;
            color: #ff8844;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 3px;
        }
        .conjunction-safe .conjunction-header {
            color: #66ff66;
        }
        .conjunction-entry {
            font-size: 11px;
            line-height: 1.5;
            padding: 2px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .conjunction-entry:last-child {
            border-bottom: none;
        }
        .conjunction-entry.first-order .conjunction-norad,
        .conjunction-entry.first-order .conjunction-dist {
            color: #ff5555;
        }
        .conjunction-entry.second-order .conjunction-norad,
        .conjunction-entry.second-order .conjunction-dist {
            color: #ffcc44;
        }
        .conjunction-name {
            color: #ccc;
        }
        .conjunction-tca {
            color: #888;
            font-size: 10px;
        }
        .conjunction-via {
            color: #888;
            font-size: 10px;
            font-style: italic;
        }
        /* Brief border glow when alert card is out of view — draws attention */
        @keyframes conjunction-pulse-anim {
            0%   { box-shadow: 0 0 0 0 rgba(255, 100, 0, 0.7); }
            50%  { box-shadow: 0 0 0 6px rgba(255, 100, 0, 0.0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 100, 0, 0.0); }
        }
        .conjunction-pulse {
            animation: conjunction-pulse-anim 1.0s ease-out forwards;
        }
        /* Toast notification at the top of the side panel */
        .conjunction-toast {
            background: #1a0d00;
            border: 1px solid #ff6600;
            color: #ffcc88;
            font-size: 12px;
            font-family: monospace;
            padding: 6px 10px;
            margin: 4px 0;
            border-radius: 3px;
            transition: opacity 0.6s ease-out;
            z-index: 50;
        }

        /* Tracked object counter — header right side */
        .tracked-count { float: right; color: #66ff66; font-size: 14px; font-weight: bold; letter-spacing: 0.05em; padding: 2px 12px; border: 1px solid #333; border-radius: 3px; margin-top: 2px; margin-right: 10px; }

        /* WebSocket status indicator — header right side */
        .ws-status { float: right; font-size: 11px; padding: 3px 8px; border-radius: 3px; margin-top: 3px; margin-right: 10px; }
        .ws-live { color: #66ff66; border: 1px solid #2a4a2a; }
        .ws-reconnecting { color: #ffaa00; border: 1px solid #4a3a1a; }

        /* Per-card dismiss button */
        .alert-dismiss-btn {
            float: right;
            background: none;
            border: none;
            color: #555;
            font-family: monospace;
            font-size: 14px;
            line-height: 1;
            padding: 0 2px;
            cursor: pointer;
        }
        .alert-dismiss-btn:hover {
            color: #aaa;
        }

        /* History nav link — header right side, before mute button */
        #history-nav-link {
            float: right;
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            text-decoration: none;
            padding: 3px 10px;
            border: 1px solid #444;
            border-radius: 3px;
            margin-top: 2px;
            margin-right: 8px;
        }
        #history-nav-link:hover { color: #fff; border-color: #666; }

        /* Mute toggle button — top-right of header */
        #mute-toggle {
            float: right;
            background: none;
            border: 1px solid #444;
            color: #888;
            font-family: monospace;
            font-size: 13px;
            padding: 2px 10px;
            cursor: pointer;
            border-radius: 3px;
            margin-top: 2px;
        }
        #mute-toggle:hover {
            color: #ccc;
            border-color: #666;
        }

        /* Fullscreen anomaly flash overlay */
        #anomaly-flash-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9998;
            background: radial-gradient(ellipse at center, rgba(180, 0, 0, 0.35) 0%, rgba(120, 0, 0, 0.55) 100%);
            pointer-events: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .flash-object-name {
            font-size: 48px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            font-family: monospace;
            letter-spacing: 0.05em;
            max-width: 80vw;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .flash-anomaly-type {
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 8px;
            font-family: monospace;
            letter-spacing: 0.08em;
            color: #ffcccc;
        }
        /* Anomaly-type-specific colors — matches .alert-type-badge palette */
        .flash-anomaly-type.maneuver         { color: #ffcccc; }
        .flash-anomaly-type.drag_anomaly     { color: #ffe0cc; }
        .flash-anomaly-type.filter_divergence { color: #ddaaff; }
    </style>
</head>
<body>
    <div id="header">
        <button id="mute-toggle">&#x1F514; UNMUTE</button>
        <a href="history.html" id="history-nav-link">HISTORY</a>
        <span id="tracked-count" class="tracked-count">0 TRACKED</span>
        <span id="ws-status" class="ws-status ws-live">LIVE</span>
        ne-body SSA Platform — Continuous Monitoring &amp; Prediction
    </div>
    <div id="object-info-panel"></div>
    <div id="main-layout">
        <div id="cesium-container"></div>
        <div id="side-panel">
            <div id="alert-panel-header" class="alert-header">
                <span class="alert-panel-toggle" id="alert-panel-toggle">&#9660;</span>
                ANOMALY ALERTS
            </div>
            <div id="alert-panel"></div>
            <div id="residual-chart"><div class="alert-header" id="chart-section-header">RESIDUALS / NIS</div></div>
        </div>
        <div id="alerts-reopen-tab" title="Show alerts panel">ALERTS &#9664;</div>
    </div>

    <!-- Anomaly flash overlay — direct child of body to escape Cesium stacking context -->
    <div id="anomaly-flash-overlay">
        <div class="flash-object-name"></div>
        <div class="flash-anomaly-type"></div>
    </div>

    <!-- Application JS modules (ES2022, loaded as modules) -->
    <script type="module" src="src/main.js?v=17"></script>
    <noscript>
        <div style="position:fixed;top:0;left:0;width:100%;padding:20px;background:#300;color:#fff;font-size:18px;text-align:center;z-index:9999;">
            JavaScript is required to run the ne-body SSA Platform.
        </div>
    </noscript>
</body>
</html>
